<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফাটাকেষ্ট টিভি - এডমিন প্যানেল</title>
    <!-- বাংলা ও আধুনিক ফন্ট -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1877f2;
            --primary-hover: #166fe5;
            --danger: #e53935;
            --danger-hover: #c62828;
            --success: #2e7d32;
            --success-hover: #1b5e20;
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --border: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Hind Siliguri', 'Outfit', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            background-image: radial-gradient(circle at 10% 20%, rgba(24, 119, 242, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(229, 57, 53, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
        }

        /* Login Screen */
        #login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        .login-card img {
            max-width: 180px;
            margin-bottom: 20px;
        }

        .login-card h2 {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: var(--text-main);
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(24, 119, 242, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), #1d4ed8);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(24, 119, 242, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(24, 119, 242, 0.4);
        }

        /* Dashboard Screen */
        #dashboard-container {
            display: none; /* Initially hidden */
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            box-sizing: border-box;
            animation: fadeIn 0.6s ease-out;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .header-logo img {
            height: 50px;
        }

        .header-logo h1 {
            font-size: 1.8rem;
            margin: 0;
            background: linear-gradient(135deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logout-btn {
            padding: 10px 20px;
            background-color: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            border-color: var(--danger);
            color: var(--danger);
            background-color: rgba(229, 57, 53, 0.05);
        }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--primary);
        }

        .stat-card.pending::before { background-color: #f59e0b; }
        .stat-card.posted::before { background-color: var(--success); }

        .stat-card h3 {
            margin: 0 0 10px 0;
            font-size: 0.95rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
        }

        /* Tabs and Filters */
        .controls-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .tabs {
            display: flex;
            background-color: rgba(15, 23, 42, 0.5);
            padding: 6px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            padding: 8px 20px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background-color: var(--bg-card);
            color: var(--text-main);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .refresh-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            border-color: var(--primary);
            background-color: rgba(24, 119, 242, 0.05);
        }

        /* Requests Grid */
        .requests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .request-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
            animation: cardEntrance 0.5s ease-out;
        }

        .request-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
            border-color: #475569;
        }

        .card-image-container {
            position: relative;
            width: 100%;
            padding-top: 100%; /* Square aspect ratio 1:1 */
            background-color: #0f172a;
            cursor: pointer;
            overflow: hidden;
        }

        .card-image-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .request-card:hover .card-image-container img {
            transform: scale(1.05);
        }

        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card-image-container:hover .image-overlay {
            opacity: 1;
        }

        .image-overlay span {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .card-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .card-headline {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.5;
            margin: 0 0 20px 0;
            color: var(--text-main);
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-actions {
            display: flex;
            gap: 12px;
            margin-top: auto;
        }

        .btn {
            flex: 1;
            padding: 10px 14px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-publish {
            background-color: var(--primary);
            color: white;
        }

        .btn-publish:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        .btn-delete {
            background-color: rgba(229, 57, 53, 0.1);
            color: var(--danger);
            border: 1px solid rgba(229, 57, 53, 0.2);
        }

        .btn-delete:hover:not(:disabled) {
            background-color: var(--danger);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Lightbox modal for enlarged image */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            cursor: zoom-out;
        }

        .lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            border: 1px solid var(--border);
            animation: zoomIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .no-data {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: var(--text-muted);
            border: 2px dashed var(--border);
            border-radius: 16px;
        }

        .no-data h3 {
            font-size: 1.3rem;
            color: var(--text-main);
            margin: 0 0 10px 0;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes zoomIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-main);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>
<body>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <img id="lightbox-img" src="" alt="Enlarged view">
    </div>

    <!-- Login Container -->
    <div id="login-container">
        <div class="login-card">
            <img src="https://i.postimg.cc/xdGDsnws/Logo-small.png" alt="ফাটাকেষ্ট টিভি লোগো">
            <h2>এডমিন লগইন</h2>
            <form id="login-form">
                <div class="input-group">
                    <label for="password">এডমিন পাসওয়ার্ড লিখুন:</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="login-btn">লগইন করুন</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Container -->
    <div id="dashboard-container">
        <header>
            <div class="header-logo">
                <img src="https://i.postimg.cc/xdGDsnws/Logo-small.png" alt="লোগো">
                <h1>এডমিন ড্যাশবোর্ড</h1>
            </div>
            <button id="logout-btn" class="logout-btn">লগআউট</button>
        </header>

        <!-- Stats Row -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>সর্বমোট অনুরোধ</h3>
                <div id="stat-total" class="value">0</div>
            </div>
            <div class="stat-card pending">
                <h3>পেন্ডিং অনুরোধ</h3>
                <div id="stat-pending" class="value">0</div>
            </div>
            <div class="stat-card posted">
                <h3>পোস্ট করা হয়েছে</h3>
                <div id="stat-posted" class="value">0</div>
            </div>
        </div>

        <!-- Controls Row -->
        <div class="controls-row">
            <div class="tabs">
                <button id="tab-pending" class="tab-btn active">পেন্ডিং অনুরোধসমূহ</button>
                <button id="tab-history" class="tab-btn">পোস্ট হিস্টোরি</button>
            </div>
            <button id="refresh-btn" class="refresh-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
                রিফ্রেশ করুন
            </button>
        </div>

        <!-- Requests Grid -->
        <div id="requests-grid" class="requests-grid">
            <!-- Dynamic data will be injected here -->
        </div>
    </div>

    <script>
        const loginContainer = document.getElementById('login-container');
        const dashboardContainer = document.getElementById('dashboard-container');
        const loginForm = document.getElementById('login-form');
        const passwordInput = document.getElementById('password');
        const logoutBtn = document.getElementById('logout-btn');
        const refreshBtn = document.getElementById('refresh-btn');
        
        const tabPending = document.getElementById('tab-pending');
        const tabHistory = document.getElementById('tab-history');
        const requestsGrid = document.getElementById('requests-grid');

        const statTotal = document.getElementById('stat-total');
        const statPending = document.getElementById('stat-pending');
        const statPosted = document.getElementById('stat-posted');

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        let currentTab = 'pending'; // 'pending' or 'posted'
        let allRequests = [];

        // Check if already logged in
        document.addEventListener('DOMContentLoaded', () => {
            const savedPassword = localStorage.getItem('admin_password');
            if (savedPassword) {
                showDashboard();
            }
        });

        // Form Submit Login
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const password = passwordInput.value;
            localStorage.setItem('admin_password', password);
            showDashboard();
        });

        // Logout
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem('admin_password');
            location.reload();
        });

        // Refresh Data
        refreshBtn.addEventListener('click', () => {
            fetchData();
        });

        // Tab Switching
        tabPending.addEventListener('click', () => {
            if (currentTab !== 'pending') {
                currentTab = 'pending';
                tabPending.classList.add('active');
                tabHistory.classList.remove('active');
                renderRequests();
            }
        });

        tabHistory.addEventListener('click', () => {
            if (currentTab !== 'posted') {
                currentTab = 'posted';
                tabHistory.classList.add('active');
                tabPending.classList.remove('active');
                renderRequests();
            }
        });

        // Lightbox Close
        lightbox.addEventListener('click', () => {
            lightbox.style.display = 'none';
        });

        function showDashboard() {
            loginContainer.style.display = 'none';
            dashboardContainer.style.display = 'flex';
            fetchData();
        }

        async function fetchData() {
            const password = localStorage.getItem('admin_password');
            requestsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px;">অনুরোধ লোড হচ্ছে...</div>';
            
            try {
                const response = await fetch('/api/get-requests', {
                    method: 'GET',
                    headers: {
                        'X-Admin-Password': password
                    }
                });

                if (response.status === 401) {
                    alert('ভুল পাসওয়ার্ড! দয়া করে আবার ট্রাই করুন।');
                    localStorage.removeItem('admin_password');
                    location.reload();
                    return;
                }

                const result = await response.json();
                if (response.ok && result.success) {
                    allRequests = result.requests || [];
                    updateStats();
                    renderRequests();
                } else {
                    requestsGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--danger);">ত্রুটি: ${result.error || 'অনুরোধ লোড করতে ব্যর্থ'}</div>`;
                }
            } catch (err) {
                console.error(err);
                requestsGrid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--danger);">নেটওয়ার্ক ত্রুটি! সার্ভার সংযুক্ত করা যাচ্ছে না।</div>';
            }
        }

        function updateStats() {
            const total = allRequests.length;
            const pending = allRequests.filter(r => r.status === 'pending').length;
            const posted = allRequests.filter(r => r.status === 'posted').length;

            statTotal.innerText = total;
            statPending.innerText = pending;
            statPosted.innerText = posted;
        }

        function renderRequests() {
            const filtered = allRequests.filter(r => r.status === currentTab);
            requestsGrid.innerHTML = '';

            if (filtered.length === 0) {
                requestsGrid.innerHTML = `
                    <div class="no-data">
                        <h3>কোনো অনুরোধ পাওয়া যায়নি!</h3>
                        <p>${currentTab === 'pending' ? 'সব অনুরোধ প্রসেস করা হয়ে গেছে।' : 'এখনও কোনো পোস্ট ফেসবুকে শেয়ার করা হয়নি।'}</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(request => {
                const dateObj = new Date(request.created_at);
                const formattedTime = dateObj.toLocaleString('bn-BD', { hour12: true });

                const card = document.createElement('div');
                card.className = 'request-card';
                card.innerHTML = `
                    <div class="card-image-container" onclick="openLightbox('${request.image_url}')">
                        <img src="${request.image_url}" alt="News Image">
                        <div class="image-overlay">
                            <span>জুম করুন 🔍</span>
                        </div>
                    </div>
                    <div class="card-content">
                        <div class="card-meta">
                            <span>তারিখ: ${request.date}</span>
                            <span>জমা: ${formattedTime}</span>
                        </div>
                        <h4 class="card-headline">${request.headline}</h4>
                        <div class="card-actions">
                            ${request.status === 'pending' ? `
                                <button class="btn btn-publish" onclick="publishRequest('${request.id}', this)">
                                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                                    পোস্ট করুন
                                </button>
                            ` : `
                                <button class="btn btn-publish" disabled style="background-color: var(--success);">
                                    ✔ পোস্ট করা হয়েছে
                                </button>
                            `}
                            <button class="btn btn-delete" onclick="deleteRequest('${request.id}', this)">
                                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round"/></svg>
                                ডিলিট
                            </button>
                        </div>
                    </div>
                `;
                requestsGrid.appendChild(card);
            });
        }

        function openLightbox(url) {
            lightboxImg.src = url;
            lightbox.style.display = 'flex';
        }

        async function publishRequest(id, button) {
            if (!confirm('আপনি কি এই খবরটি সরাসরি ফেইসবুক পেজে পোস্ট করতে চান?')) return;

            const password = localStorage.getItem('admin_password');
            button.disabled = true;
            const originalText = button.innerHTML;
            button.innerText = 'পোস্ট হচ্ছে...';

            try {
                const response = await fetch('/api/publish-post', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Password': password
                    },
                    body: JSON.stringify({ id })
                });

                const result = await response.json();
                if (response.ok && result.success) {
                    alert('ফেসবুক পেইজে সফলভাবে পোস্ট করা হয়েছে!');
                    fetchData();
                } else {
                    alert('পোস্ট করতে ব্যর্থ হয়েছে: ' + (result.error || 'অজানা ত্রুটি'));
                    button.disabled = false;
                    button.innerHTML = originalText;
                }
            } catch (err) {
                console.error(err);
                alert('নেটওয়ার্ক সমস্যা! অনুগ্রহ করে আবার চেষ্টা করুন।');
                button.disabled = false;
                button.innerHTML = originalText;
            }
        }

        async function deleteRequest(id, button) {
            if (!confirm('আপনি কি নিশ্চিত যে এই অনুরোধটি সম্পূর্ণ ডিলিট করতে চান? এটি স্টোরেজ থেকেও মুছে যাবে।')) return;

            const password = localStorage.getItem('admin_password');
            button.disabled = true;
            const originalText = button.innerHTML;
            button.innerText = 'মুছে ফেলা হচ্ছে...';

            try {
                const response = await fetch('/api/delete-request', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Password': password
                    },
                    body: JSON.stringify({ id })
                });

                const result = await response.json();
                if (response.ok && result.success) {
                    alert('অনুরোধটি সফলভাবে ডিলিট করা হয়েছে!');
                    fetchData();
                } else {
                    alert('ডিলিট করতে ব্যর্থ হয়েছে: ' + (result.error || 'অজানা ত্রুটি'));
                    button.disabled = false;
                    button.innerHTML = originalText;
                }
            } catch (err) {
                console.error(err);
                alert('নেটওয়ার্ক সমস্যা! অনুগ্রহ করে আবার চেষ্টা করুন।');
                button.disabled = false;
                button.innerHTML = originalText;
            }
        }
